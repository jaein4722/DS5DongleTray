name: Build release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if [ -z "$tag" ]; then
            echo "No release tag was provided." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes
          fi

  build:
    name: Build Windows tray app
    needs: create-release
    runs-on: windows-latest
    env:
      PROJECT: src/DS5DongleTray/DS5DongleTray.csproj
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore $env:PROJECT

      - name: Publish win-x64
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          dotnet publish $env:PROJECT `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:Version=$version `
            -o publish/win-x64

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $asset = "artifacts/DS5DongleTray-$env:RELEASE_TAG-win-x64.exe"
          Copy-Item "publish/win-x64/DS5DongleTray.exe" $asset -Force
          Get-FileHash $asset -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $(Split-Path $asset -Leaf)" } |
            Set-Content "artifacts/DS5DongleTray-$env:RELEASE_TAG-win-x64.exe.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: DS5DongleTray-${{ env.RELEASE_TAG }}-win-x64
          path: artifacts/*
          if-no-files-found: error

      - name: Attach assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" artifacts/* \
            --repo "${{ github.repository }}" --clobber
